<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — Empire Broker Pro</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="mobile-toggle">☰</div>
      <div class="sidebar-logo"><div class="logo-icon">🏛️</div><h1>Empire<small>Broker Pro</small></h1></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-details"><div class="name" id="user-name">User</div><div class="role" id="user-role">Role</div></div>
          <button class="logout-btn" data-logout>🚪</button>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="page-header flex-between">
        <div>
          <h2>👥 Client CRM</h2>
          <p class="subtitle">Manage your mortgage clients and track their loan status</p>
        </div>
        <button class="btn btn-primary" onclick="newClient()">➕ Add Client</button>
      </header>
      
      <!-- Search -->
      <div class="search-bar mb-4">
        <input type="text" id="clientSearch" class="form-control" placeholder="🔍 Search clients by name or email..." oninput="renderClients(this.value)">
      </div>
      
      <!-- Clients Table -->
      <div class="card" id="clientsTable">
        <div class="card-body">
          <table class="table-container">
            <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Pre-Approval</th><th>Status</th><th class="text-right">Actions</th></tr></thead>
            <tbody id="clientsBody"><tr><td colspan="6" class="text-center">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Client Modal -->
  <div class="modal-overlay" id="clientModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="clientModalTitle">Add Client</h3>
        <button class="modal-close" onclick="closeModal('clientModal')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="clientId">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="clientName" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="clientStatus" class="form-control">
              <option value="pre-qualified">Pre-Qualified</option>
              <option value="application">Application</option>
              <option value="processing">Processing</option>
              <option value="underwriting">Underwriting</option>
              <option value="closing">Closing</option>
              <option value="closed">Closed</option>
              <option value="denied">Denied</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="clientEmail" class="form-control" placeholder="john@email.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="clientPhone" class="form-control" placeholder="(555) 123-4567">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Pre-Approval Amount</label>
            <input type="number" id="clientPreApproval" class="form-control" placeholder="500000" step="1000">
          </div>
          <div class="form-group">
            <label>Credit Score</label>
            <input type="number" id="clientCredit" class="form-control" placeholder="720" min="300" max="850">
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="clientNotes" class="form-control" rows="3" placeholder="Additional notes..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('clientModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveClient()">Save Client</button>
      </div>
    </div>
  </div>
  
  <!-- View Client Modal -->
  <div class="modal-overlay" id="viewClientModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Client Details</h3>
        <button class="modal-close" onclick="closeModal('viewClientModal')">×</button>
      </div>
      <div class="modal-body" id="viewClientContent"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('viewClientModal')">Close</button>
      </div>
    </div>
  </div>
  
  <div id="toast-container" class="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/mortgage.js"></script>
</body>
</html>
