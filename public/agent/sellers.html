<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller CRM — Empire Broker Pro</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="mobile-toggle">☰</div>
      <div class="sidebar-logo"><div class="logo-icon">🏛️</div><h1>Empire<small>Broker Pro</small></h1></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-details"><div class="name" id="user-name">User</div><div class="role" id="user-role">Role</div></div>
          <button class="logout-btn" data-logout>🚪</button>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="page-header flex-between">
        <div>
          <h2>💼 Seller CRM</h2>
          <p class="subtitle">Manage seller clients and track their properties</p>
        </div>
        <button class="btn btn-primary" onclick="newSeller()">➕ Add Seller</button>
      </header>
      
      <div class="search-bar mb-4">
        <input type="text" id="sellerSearch" class="form-control" placeholder="🔍 Search sellers by name or email..." oninput="renderSellers(this.value)">
      </div>
      
      <div class="card" id="sellersTable">
        <div class="card-body">
          <table class="table-container">
            <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Properties</th><th>Est. Value</th><th class="text-right">Actions</th></tr></thead>
            <tbody id="sellersBody"><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Seller Modal -->
  <div class="modal-overlay" id="sellerModal">
    <div class="modal">
      <div class="modal-header"><h3 id="sellerModalTitle">Add Seller</h3><button class="modal-close" onclick="closeModal('sellerModal')">×</button></div>
      <div class="modal-body">
        <input type="hidden" id="sellerId">
        <div class="form-row">
          <div class="form-group"><label>Full Name *</label><input type="text" id="sellerName" class="form-control" placeholder="John Doe" required></div>
          <div class="form-group"><label>Status</label>
            <select id="sellerStatus" class="form-control">
              <option value="active">Active</option>
              <option value="pending">Pending</option>
              <option value="sold">Sold</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input type="email" id="sellerEmail" class="form-control" placeholder="seller@email.com"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="sellerPhone" class="form-control" placeholder="(555) 123-4567"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Property Address</label><input type="text" id="sellerAddress" class="form-control" placeholder="123 Main St"></div>
          <div class="form-group"><label>List Price</label><input type="number" id="sellerListPrice" class="form-control" placeholder="500000" step="1000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Sole Selling Agreement?</label><input type="checkbox" id="sellerSole" style="width:auto;margin-left:8px"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="sellerNotes" class="form-control" rows="2" placeholder="Additional notes..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('sellerModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveSeller()">Save Seller</button>
      </div>
    </div>
  </div>
  
  <div id="toast-container" class="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/agent.js"></script>
</body>
</html>
