<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Listings — Empire Broker Pro</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="mobile-toggle">☰</div>
      <div class="sidebar-logo"><div class="logo-icon">🏛️</div><h1>Empire<small>Broker Pro</small></h1></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-details"><div class="name" id="user-name">User</div><div class="role" id="user-role">Role</div></div>
          <button class="logout-btn" data-logout>🚪</button>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="page-header flex-between">
        <div>
          <h2>🏠 Property Listings</h2>
          <p class="subtitle">Manage your real estate listings</p>
        </div>
        <button class="btn btn-primary" onclick="newProperty()">➕ Add Listing</button>
      </header>
      
      <!-- Filters -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="search-bar">
            <input type="text" id="listingSearch" class="form-control" placeholder="🔍 Search by address, city, or notes..." oninput="renderProperties()">
          </div>
          <div class="pipeline" style="flex-wrap:wrap;justify-content:flex-start;gap:8px;margin-top:12px">
            <a class="pipeline-stage" href="#" onclick="filterListings('all');return false" id="filter-all"><div class="count">All</div></a>
            <a class="pipeline-stage" href="#" onclick="filterListings('active');return false" id="filter-active"><div class="count">Active</div></a>
            <a class="pipeline-stage" href="#" onclick="filterListings('pending');return false" id="filter-pending"><div class="count">Pending</div></a>
            <a class="pipeline-stage" href="#" onclick="filterListings('sold');return false" id="filter-sold"><div class="count">Sold</div></a>
            <a class="pipeline-stage" href="#" onclick="filterListings('withdrawn');return false" id="filter-withdrawn"><div class="count">Withdrawn</div></a>
            <a class="pipeline-stage" href="#" onclick="filterListings('expired');return false" id="filter-expired"><div class="count">Expired</div></a>
          </div>
        </div>
      </div>
      
      <!-- Listings Table -->
      <div class="card" id="listingsTable">
        <div class="card-body">
          <table class="table-container">
            <thead><tr><th>Address</th><th>City</th><th>Price</th><th>Status</th><th>DOM</th><th>Seller</th><th class="text-right">Actions</th></tr></thead>
            <tbody id="propertiesBody"><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Property Modal -->
  <div class="modal-overlay" id="propertyModal">
    <div class="modal">
      <div class="modal-header"><h3 id="propertyModalTitle">Add Listing</h3><button class="modal-close" onclick="closeModal('propertyModal')">×</button></div>
      <div class="modal-body">
        <input type="hidden" id="propertyId">
        <div class="form-group"><label>Address *</label><input type="text" id="propertyAddress" class="form-control" placeholder="123 Main St" required></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" id="propertyCity" class="form-control" placeholder="City" required></div>
          <div class="form-group"><label>State</label><input type="text" id="propertyState" class="form-control" placeholder="CA" maxlength="2"></div>
          <div class="form-group"><label>ZIP</label><input type="text" id="propertyZip" class="form-control" placeholder="12345" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Price *</label><input type="number" id="propertyPrice" class="form-control" placeholder="500000" required></div>
          <div class="form-group"><label>Status</label>
            <select id="propertyStatus" class="form-control">
              <option value="active">Active</option>
              <option value="pending">Pending</option>
              <option value="sold">Sold</option>
              <option value="withdrawn">Withdrawn</option>
              <option value="expired">Expired</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Bedrooms</label><input type="number" id="propertyBeds" class="form-control" placeholder="3"></div>
          <div class="form-group"><label>Bathrooms</label><input type="number" id="propertyBaths" class="form-control" step="0.5" placeholder="2"></div>
          <div class="form-group"><label>Sq Ft</label><input type="number" id="propertySqft" class="form-control" placeholder="2000"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="propertyNotes" class="form-control" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('propertyModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveProperty()">Save Property</button>
      </div>
    </div>
  </div>
  
  <!-- Price History Modal -->
  <div class="modal-overlay" id="priceHistoryModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header"><h3>Price History</h3><button class="modal-close" onclick="closeModal('priceHistoryModal')">×</button></div>
      <div class="modal-body">
        <table class="table-container">
          <thead><tr><th>Date</th><th>Old Price</th><th>New Price</th><th>Change</th><th>Notes</th></tr></thead>
          <tbody id="priceHistoryBody"></tbody>
        </table>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('priceHistoryModal')">Close</button></div>
    </div>
  </div>
  
  <div id="toast-container" class="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/agent.js"></script>
</body>
</html>
