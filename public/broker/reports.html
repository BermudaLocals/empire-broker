<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Reports — Empire Broker Pro</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="mobile-toggle">☰</div>
      <div class="sidebar-logo"><div class="logo-icon">🏛️</div><h1>Empire<small>Broker Pro</small></h1></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-details"><div class="name" id="user-name">User</div><div class="role" id="user-role">Role</div></div>
          <button class="logout-btn" data-logout>🚪</button>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="page-header flex-between">
        <div>
          <h2>📊 Office Reports</h2>
          <p class="subtitle">Office-wide performance analytics and reporting</p>
        </div>
        <button class="btn btn-secondary" onclick="loadReports()">🔄 Refresh Data</button>
      </header>
      
      <!-- Reports Container -->
      <div id="reportsContent">
        <div class="card"><div class="card-body text-center"><p>Loading reports...</p></div></div>
      </div>
    </main>
  </div>
  
  <div id="toast-container" class="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/broker.js"></script>
</body>
</html>
